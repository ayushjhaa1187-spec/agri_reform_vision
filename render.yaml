databases:
  - name: agri-db
    databaseName: agri_reform
    user: admin

services:
  # Redis Instance
  - type: keyvalue
    name: agri-redis
    ipAllowList: [] # Allows internal access only

  # FastAPI Web Service
  - type: web
    name: agri-backend
    env: docker
    dockerfilePath: ./backend/Dockerfile
    plan: free
    region: ohio
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: agri-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: agri-redis
          property: connectionString
      - key: GOOGLE_API_KEY
        sync: false # Set manually in Render Dashboard
